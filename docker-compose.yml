services:
  next:
    build:
      context: .
      dockerfile: docker/Dockerfile.next
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - /app/node_modules
    command: npm run dev

  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    ports:
      - "3001:3001"
    volumes:
      - ./services/dataBase:/data